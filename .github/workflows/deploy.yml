# =============================================================================
# TeleFlow Deployment Pipeline
# =============================================================================
#
# Triggered on tags: v*
# Builds release artifacts and deploys backend to staging/production.
#
# SECURITY NOTE:
#   Proxy credentials are injected via GitHub Secrets → PROXY_LIST_B64.
#   They NEVER appear in source code or build logs.

name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---- Release Build (AAB for Google Play) ----
  release-android:
    name: Release Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release AAB
        working-directory: ./android
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: teleflow-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

  # ---- Backend Deploy ----
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [release-android]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to fly.io / Hetzner / etc. (configurable)
      # - name: Deploy to Fly.io
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #   with:
      #     flyctl-version: latest
      # - name: Deploy
      #   run: flyctl deploy --remote-only
      #   working-directory: ./backend
